---
- name: Setup Cold War Red Team Jump Box
  hosts: localhost
  become: true

  vars:
    tools_dir: "/opt/red-tools"
    frostbite_dir: "{{ tools_dir }}/frostbite-agent"
    A_poc: "https://github.com/A-poc/RedTeam-Tools"
    dns_secret: "HW4_Secret_2026"

  tasks:
    # -----------------------------
    # 1. System & Dependency Setup
    # -----------------------------
    - name: Install core dependencies
      apt:
        update_cache: yes
        name:
          - git
          - curl
          - wget
          - build-essential
          - ruby-full
          - python3
          - python3-pip
          - netcat-openbsd
          - jq        # Critical for beautifying Frostbite JSON
          - tmux      # Critical for managing multiple listeners
          - ufw       # To manage the firewall
        state: present

    - name: Create tools directory structure
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ tools_dir }}"
        - "{{ frostbite_dir }}"

    # -----------------------------
    # 2. Install Sliver C2
    # -----------------------------
    - name: Install Sliver C2 Server
      shell: "curl https://sliver.sh/install | bash"
      args:
        creates: /usr/local/bin/sliver-server

    # -----------------------------
    # 3. Install dnscat2 (Server)
    # -----------------------------
    - name: Clone dnscat2
      git:
        repo: "https://github.com/iagox86/dnscat2.git"
        dest: "{{ tools_dir }}/dnscat2"

    - name: Install Ruby bundler
      gem:
        name: bundler
        state: present

    - name: Install dnscat2 server dependencies
      command: bundle install
      args:
        chdir: "{{ tools_dir }}/dnscat2/server"

    # -----------------------------
    # 4. Deploy Frostbite Agent
    # -----------------------------
    - name: Copy Frostbite Agent files
      copy:
        src: frostbite-agent/   
        dest: "{{ frostbite_dir }}/"
        mode: '0755'

    # -----------------------------
    # 5. Create Operational Commands (The "Global" Tools)
    # -----------------------------
    - name: Create 'frostbite' command
      copy:
        dest: /usr/local/bin/frostbite
        mode: '0755'
        content: |
          #!/bin/bash
          python3 {{ frostbite_dir }}/frostbite_agent.py

    - name: Create 'call_moscow' command (dnscat2)
      copy:
        dest: /usr/local/bin/call_moscow
        mode: '0755'
        content: |
          #!/bin/bash
          # Stop system resolver to free up Port 53
          sudo systemctl stop systemd-resolved
          sudo ruby {{ tools_dir }}/dnscat2/server/dnscat2.rb --dns "port=53" --secret={{ dns_secret }}

    - name: Create 'view_loot' command (The Catcher)
      copy:
        dest: /usr/local/bin/view_loot
        mode: '0755'
        content: |
          #!/bin/bash
          echo "[*] Cold War Loot Listener Active on Port 443..."
          sudo nc -lk -p 443 | jq .

    # -----------------------------
    # 6. Configuration & Quality of Life
    # -----------------------------
    - name: Add aliases to .zshrc and .bashrc
      lineinfile:
        path: "{{ item }}"
        line: "{{ alias_item }}"
        create: yes
      loop:
        - "~/.zshrc"
        - "~/.bashrc"
      vars:
        alias_item: |
          alias score_goal='/usr/local/bin/sliver-server'
          alias frostbite='/usr/local/bin/frostbite'
          alias call_moscow='/usr/local/bin/call_moscow'
          alias view_loot='/usr/local/bin/view_loot'

    - name: Set Cold War MOTD
      copy:
        dest: /etc/motd
        content: |
          ==================================================
          RED TEAM OPERATIONAL HUB - LAKE PLACID 1980
          --------------------------------------------------
          COMMANDS:
            score_goal     -> Launch Sliver C2
            view_loot      -> Catch Frostbite Exfiltration
            call_moscow    -> Start DNS Fallback Listener
            frostbite      -> Run Local Agent Test
          ==================================================

    - name: Open Firewall Ports
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: any
      loop:
        - '443'
        - '80'
        - '53'
        - '8888' # mTLS Default
